name: ETF Holdings Daily Tracker

on:
  schedule:
    # Taipei 15:00 = UTC 07:00. Runs every day.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      etf:
        description: 'ETF code (leave blank to run all)'
        required: false
        default: ''
      date:
        description: 'Override data date (YYYY-MM-DD), optional'
        required: false
        default: ''
      force_report:
        description: 'Force re-generate report'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Determines which ETFs to run: all by default, or the one specified via workflow_dispatch.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ETF_INPUT="${{ github.event.inputs.etf }}"
          if [ -z "$ETF_INPUT" ]; then
            echo 'matrix={"etf":["00981A","0050","006208"]}' >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"etf\":[\"$ETF_INPUT\"]}" >> "$GITHUB_OUTPUT"
          fi

  run-agent:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 540
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false   # one ETF failing should not cancel the others

    env:
      TZ: Asia/Taipei
      PYTHONUNBUFFERED: "1"
      GMAIL_SMTP_HOST: smtp.gmail.com
      GMAIL_SMTP_PORT: "587"
      GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_RECEIVER_EMAILS: ${{ secrets.GMAIL_RECEIVER_EMAILS }}
      GMAIL_RECEIVER_EMAIL: ${{ secrets.GMAIL_RECEIVER_EMAIL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      NOTIFY_ON_NO_UPDATE: "false"
      NO_UPDATE_RETRY_MINUTES: "30"
      NO_UPDATE_MAX_ATTEMPTS: "18"
      SOURCE_ORDER: moneydj,ezmoney,official,twse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: data/etf_holdings.sqlite
          key: etf-holdings-db-${{ matrix.etf }}-${{ github.run_id }}
          restore-keys: |
            etf-holdings-db-${{ matrix.etf }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (fast unit checks)
        run: pytest -q tests/

      - name: Run agent
        id: run_agent
        run: |
          set -euo pipefail
          ETF="${{ matrix.etf }}"
          ARGS=(--etf "$ETF")
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS+=(--date "${{ github.event.inputs.date }}")
          fi
          if [ "${{ github.event.inputs.force_report }}" = "true" ]; then
            ARGS+=(--force-report)
          fi

          run_agent_once() {
            local log_file="$1"
            set +e
            python -m src.main "${ARGS[@]}" 2>&1 | tee "$log_file"
            local status="${PIPESTATUS[0]}"
            set -e
            return "$status"
          }

          attempt=1
          while [ "$attempt" -le "$NO_UPDATE_MAX_ATTEMPTS" ]; do
            log_file="run-agent-attempt-${attempt}.log"
            echo "Starting attempt ${attempt}/${NO_UPDATE_MAX_ATTEMPTS}..."
            run_agent_once "$log_file"

            if ! grep -q '^\[no-update\]' "$log_file"; then
              echo "New data found or report generated on attempt ${attempt}."
              break
            fi

            if [ "${{ github.event.inputs.force_report }}" = "true" ]; then
              echo "Force report requested; not retrying after no-update."
              break
            fi

            if [ "$attempt" -eq "$NO_UPDATE_MAX_ATTEMPTS" ]; then
              echo "No new data after ${NO_UPDATE_MAX_ATTEMPTS} attempts. Ending without email."
              break
            fi

            echo "No new data yet. Retrying in ${NO_UPDATE_RETRY_MINUTES} minutes..."
            sleep "$((NO_UPDATE_RETRY_MINUTES * 60))"
            attempt=$((attempt + 1))
          done

      - name: Export site data
        run: python scripts/export_site_data.py --etf "${{ matrix.etf }}" --output-dir site/data

      - name: Generate AI analysis
        run: python scripts/generate_ai_analysis.py --etf "${{ matrix.etf }}" --input-dir site/data

      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/etf_holdings.sqlite
          key: etf-holdings-db-${{ matrix.etf }}-${{ github.run_id }}

      - name: Send failure email (best-effort)
        if: failure()
        run: |
          python - <<'PY' || true
          import os, smtplib
          from email.message import EmailMessage
          from datetime import datetime
          sender = os.getenv("GMAIL_SENDER_EMAIL")
          pw = os.getenv("GMAIL_APP_PASSWORD")
          rcpt = os.getenv("GMAIL_RECEIVER_EMAILS") or os.getenv("GMAIL_RECEIVER_EMAIL")
          etf = os.getenv("MATRIX_ETF", "ETF")
          if not (sender and pw and rcpt):
              print("Gmail not configured; skipping fallback failure email.")
              raise SystemExit(0)
          ts = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          msg = EmailMessage()
          msg["Subject"] = f"[{etf}持股追蹤失敗] {ts} GitHub Actions job failed"
          msg["From"] = sender
          msg["To"] = rcpt
          msg.set_content(
              f"GitHub Actions workflow failed for {etf} before the agent could send its own "
              "failure email. Check the workflow run logs for details.\n\n"
              "本報告僅為系統錯誤通知，不構成投資建議。"
          )
          with smtplib.SMTP("smtp.gmail.com", 587, timeout=30) as s:
              s.starttls(); s.login(sender, pw); s.send_message(msg)
          print("Fallback failure email sent.")
          PY
        env:
          MATRIX_ETF: ${{ matrix.etf }}

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.etf }}-${{ github.run_id }}
          path: |
            data/reports/
            data/etf_holdings.sqlite
            run-agent-attempt-*.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload site data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-data-${{ matrix.etf }}
          path: site/data/${{ matrix.etf }}/
          if-no-files-found: ignore
          retention-days: 7

  publish-site-data:
    needs: run-agent
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site data artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: site-data-*
          path: site-data-artifacts

      - name: Publish site data to repo
        run: |
          set -euo pipefail
          mkdir -p site/data
          shopt -s nullglob
          for artifact_dir in site-data-artifacts/site-data-*; do
            etf="${artifact_dir##*/site-data-}"
            mkdir -p "site/data/${etf}"
            cp -R "${artifact_dir}/." "site/data/${etf}/"
          done
          python scripts/export_site_data.py --manifest-only --output-dir site/data

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- site/data; then
            echo "No site data changes to commit."
          else
            git add site/data
            git commit -m "Update static site data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
